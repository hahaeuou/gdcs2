backend:
  name: github
  repo: komatic5/gdcs2
  base_url: https://gdcsauth.officialxyno.workers.dev
  auth_endpoint: /auth
  branch: main
  open_authoring: true

media_folder: /static/media
public_folder: /media
publish_mode: editorial_workflow
site_url: https://www.gdcreatorschool.com/

fields: &page_fields
  - { label: Draft, name: draft, widget: boolean,
    hint: "Enabling draft mode lets you save your changes, but doesn't make them available on the website."}
  - { label: Title, name: title, widget: string }
  - label: SEO
    name: seo
    widget: object
    collapsed: true
    required: false
    hint: "The SEO (title and description) people will see when viewing your guide online."
    fields:
    - { label: Title, name: title, widget: string, required: false }
    - { label: Description, name: description, widget: text, required: false }
    - { label: Canonical URL, name: canonical, widget: string, required: false }
    - { label: No Index, name: noindex, widget: boolean, required: false }
  - { label: Weight, name: weight, widget: number,
    hint: "Pages with high weight will display below pages with low weight.\nLook at other guides in this folder to see where to place your own." }
  - { label: Math, name: math, widget: boolean, required: false,
    hint: "Lets you use MathJax for math formatting in your guide."}
  - { label: Body, name: body, widget: markdown }

collections:
  - name: guides
    label: Guides
    label_singular: Guide
    folder: "content/docs/guides"
    slug: "{{slug}}"
    sortable_fields: []
    summary: "[Draft: {{ draft }}] - {{ title }}"
    nested:
      depth: 5
      subfolders: false
    fields: *page_fields
    create: true

  - name: contributing
    label: Contributing
    label_singular: Guide
    folder: "content/contributing"
    slug: "{{slug}}"
    sortable_fields: []
    summary: "[Draft: {{ draft }}] - {{ title }}"
    nested:
      depth: 5
      subfolders: false
    fields: *page_fields
    create: true
